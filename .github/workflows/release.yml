name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -o "dist/asayn-linux-amd64" ./cmd/asayn
          GOOS=linux GOARCH=arm64 go build -o "dist/asayn-linux-arm64" ./cmd/asayn
          GOOS=darwin GOARCH=amd64 go build -o "dist/asayn-darwin-amd64" ./cmd/asayn
          GOOS=darwin GOARCH=arm64 go build -o "dist/asayn-darwin-arm64" ./cmd/asayn
          GOOS=windows GOARCH=amd64 go build -o "dist/asayn-windows-amd64.exe" ./cmd/asayn

          (cd dist && sha256sum asayn-linux-amd64 asayn-linux-arm64 asayn-darwin-amd64 asayn-darwin-arm64 asayn-windows-amd64.exe > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Asayn ${{ github.ref_name }}
          body: |
            ## Changes
            - 修复模型中途输出回答不渲染的问题：现在每次完整的回答都会立即渲染markdown
            - 精简工具描述：workspaceRule 从冗长路径指引缩短为 "Support paths inside workspace only"
            - 将 .Asayn/ 保护提示和文件修改指南从工具描述移入 system_prompt，减少冗余
            - shell_run_sync 描述大幅精简
            - sub_agent_check 描述和 running 提示优化，鼓励先做其他有用工作

            ## Assets
            - `asayn-linux-amd64`: Linux amd64 二进制文件
            - `asayn-linux-arm64`: Linux arm64 二进制文件
            - `asayn-darwin-amd64`: macOS amd64 二进制文件
            - `asayn-darwin-arm64`: macOS arm64 二进制文件
            - `asayn-windows-amd64.exe`: Windows amd64 二进制文件
            - `SHA256SUMS.txt`: 资产校验和

            ## 安装方式

            **Linux/macOS:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/daife/Asayn/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/daife/Asayn/main/install.ps1" -OutFile install.ps1
            .\install.ps1
            ```
          files: |
            dist/asayn-linux-amd64
            dist/asayn-linux-arm64
            dist/asayn-darwin-amd64
            dist/asayn-darwin-arm64
            dist/asayn-windows-amd64.exe
            dist/SHA256SUMS.txt
