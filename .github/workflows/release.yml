name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: CLI binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build CLI assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          flags=(-trimpath -ldflags="-s -w -buildid=")
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build "${flags[@]}" -o release/asayn-linux-amd64 ./cmd/asayn
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build "${flags[@]}" -o release/asayn-linux-arm64 ./cmd/asayn
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build "${flags[@]}" -o release/asayn-darwin-amd64 ./cmd/asayn
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build "${flags[@]}" -o release/asayn-darwin-arm64 ./cmd/asayn
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build "${flags[@]}" -o release/asayn-windows-amd64.exe ./cmd/asayn
      - uses: actions/upload-artifact@v4
        with:
          name: cli
          path: release/*
          if-no-files-found: error

  desktop:
    name: Desktop ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            bundles: deb,appimage
            artifact: desktop-linux-x64
          - name: Windows x64
            os: windows-latest
            bundles: nsis,msi
            artifact: desktop-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgbm-dev
      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci
      - name: Build desktop packages
        working-directory: desktop
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}
      - name: Collect Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release
          find desktop/src-tauri/target/release/bundle -type f \( -name '*.deb' -o -name '*.AppImage' \) -exec cp {} release/ \;
      - name: Collect Windows packages
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Get-ChildItem desktop/src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.msi', '.exe' } |
            Copy-Item -Destination release
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: [cli, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Generate checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Asayn ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Desktop application
            This release introduces the Tauri 2 desktop client while retaining the existing Go agent engine.

            - Windows x64: NSIS setup (`.exe`) and MSI installer (`.msi`)
            - Linux x64: Debian package (`.deb`) and AppImage (`.AppImage`)
            - Existing CLI binaries remain available for Linux, macOS, and Windows.

            ## 桌面应用
            本版本新增 Tauri 2 桌面客户端，并继续使用原有 Go Agent 引擎。

            - Windows x64：NSIS 安装程序和 MSI 安装包
            - Linux x64：DEB 安装包和 AppImage
            - 同时保留 Linux、macOS、Windows 的 CLI 二进制文件
          files: release/*
          fail_on_unmatched_files: true
