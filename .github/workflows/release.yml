name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build_flags=(-trimpath -ldflags="-s -w -buildid=")

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build "${build_flags[@]}" -o "dist/asayn-linux-amd64" ./cmd/asayn
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build "${build_flags[@]}" -o "dist/asayn-linux-arm64" ./cmd/asayn
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build "${build_flags[@]}" -o "dist/asayn-darwin-amd64" ./cmd/asayn
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build "${build_flags[@]}" -o "dist/asayn-darwin-arm64" ./cmd/asayn
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build "${build_flags[@]}" -o "dist/asayn-windows-amd64.exe" ./cmd/asayn

          (cd dist && sha256sum asayn-linux-amd64 asayn-linux-arm64 asayn-darwin-amd64 asayn-darwin-arm64 asayn-windows-amd64.exe > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Asayn ${{ github.ref_name }}
          body: |
            ## Changes
            - 修复多行输入框上下键行为：多行内优先移动光标，到边界后再切换输入历史
            - 修复最终回答完成后重复渲染分割线的问题，与 `/resume` 后的样貌保持一致
            - 使用 release 构建参数压缩二进制体积：`-trimpath -ldflags="-s -w -buildid="`

            ## Assets
            - `asayn-linux-amd64`: Linux amd64 二进制文件
            - `asayn-linux-arm64`: Linux arm64 二进制文件
            - `asayn-darwin-amd64`: macOS amd64 二进制文件
            - `asayn-darwin-arm64`: macOS arm64 二进制文件
            - `asayn-windows-amd64.exe`: Windows amd64 二进制文件
            - `SHA256SUMS.txt`: 资产校验和

            ## 安装方式

            **Linux/macOS:**
            ```bash
            curl -sSL https://raw.githubusercontent.com/daife/Asayn/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/daife/Asayn/main/install.ps1" -OutFile install.ps1
            .\install.ps1
            ```
          files: |
            dist/asayn-linux-amd64
            dist/asayn-linux-arm64
            dist/asayn-darwin-amd64
            dist/asayn-darwin-arm64
            dist/asayn-windows-amd64.exe
            dist/SHA256SUMS.txt
