name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -o "dist/asayn-linux-amd64" ./cmd/asayn
          GOOS=linux GOARCH=arm64 go build -o "dist/asayn-linux-arm64" ./cmd/asayn
          GOOS=darwin GOARCH=amd64 go build -o "dist/asayn-darwin-amd64" ./cmd/asayn
          GOOS=darwin GOARCH=arm64 go build -o "dist/asayn-darwin-arm64" ./cmd/asayn
          GOOS=windows GOARCH=amd64 go build -o "dist/asayn-windows-amd64.exe" ./cmd/asayn
          (cd dist && sha256sum asayn-linux-amd64 asayn-linux-arm64 asayn-darwin-amd64 asayn-darwin-arm64 asayn-windows-amd64.exe > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Asayn ${{ github.ref_name }}
          body: |
            ## Changes
            - Removed `/copy_answer` command and all related logic.
            - Removed `sub_agent_wait_check` tool; added `delay` tool with `seconds` parameter ("Delay execution. Avoid using unless necessary.").
            - Renamed `shell_async_status` tool to `shell_async_check`.
            - Added sidebar toggle button (☰/✕) in the top-right corner of the TUI to show/hide the sidebar.

            ## Assets
            - `asayn-linux-amd64`
            - `asayn-linux-arm64`
            - `asayn-darwin-amd64`
            - `asayn-darwin-arm64`
            - `asayn-windows-amd64.exe`
            - `SHA256SUMS.txt`: asset checksums.
          files: |
            dist/asayn-linux-amd64
            dist/asayn-linux-arm64
            dist/asayn-darwin-amd64
            dist/asayn-darwin-arm64
            dist/asayn-windows-amd64.exe
            dist/SHA256SUMS.txt
