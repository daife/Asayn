name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -o "dist/asayn-linux-amd64" ./cmd/asayn
          GOOS=linux GOARCH=arm64 go build -o "dist/asayn-linux-arm64" ./cmd/asayn
          GOOS=darwin GOARCH=amd64 go build -o "dist/asayn-darwin-amd64" ./cmd/asayn
          GOOS=darwin GOARCH=arm64 go build -o "dist/asayn-darwin-arm64" ./cmd/asayn
          GOOS=windows GOARCH=amd64 go build -o "dist/asayn-windows-amd64.exe" ./cmd/asayn
          (cd dist && sha256sum asayn-linux-amd64 asayn-linux-arm64 asayn-darwin-amd64 asayn-darwin-arm64 asayn-windows-amd64.exe > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Asayn ${{ github.ref_name }}
          body: |
            ## Changes
            - Sidebar toggle: entire right-edge column now clickable to hide/show sidebar.
            - Sidebar shows title "Asayn"; Root Agent section simplified to name, model (provider), and status.
            - Removed system prompt and thinking details from sidebar for cleaner look.
            ## Assets
            - `asayn-linux-amd64`
            - `asayn-linux-arm64`
            - `asayn-darwin-amd64`
            - `asayn-darwin-arm64`
            - `asayn-windows-amd64.exe`
            - `SHA256SUMS.txt`: asset checksums.
          files: |
            dist/asayn-linux-amd64
            dist/asayn-linux-arm64
            dist/asayn-darwin-amd64
            dist/asayn-darwin-arm64
            dist/asayn-windows-amd64.exe
            dist/SHA256SUMS.txt
